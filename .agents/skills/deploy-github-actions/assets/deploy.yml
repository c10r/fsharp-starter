name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      INFRA_DIR: infra/opentofu
      TOFU_BACKEND_BUCKET: ${{ vars.TOFU_BACKEND_BUCKET }}
      TOFU_BACKEND_PREFIX: ${{ vars.TOFU_BACKEND_PREFIX }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required deploy configuration
        run: |
          set -euo pipefail
          required_vars=(
            GCP_PROJECT_ID
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_DEPLOY_SERVICE_ACCOUNT
            TOFU_BACKEND_BUCKET
            TOFU_BACKEND_PREFIX
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Missing required GitHub Actions variable: ${var_name}" >&2
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Initialize OpenTofu backend
        working-directory: ${{ env.INFRA_DIR }}
        run: |
          set -euo pipefail
          tofu init -input=false \
            -backend-config="bucket=${TOFU_BACKEND_BUCKET}" \
            -backend-config="prefix=${TOFU_BACKEND_PREFIX}"

      - name: Deploy to GCE
        run: ./scripts/deploy-gce-from-tofu.sh
